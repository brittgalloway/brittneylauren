<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Brittney Lauren Stationery — hand-crafted letters, cards, and envelopes. Sign up to be notified when the shop launches.">
    <meta name="keywords" content="Letters, Cards, Envelopes, Stationery">
    <link rel="icon" type="image/svg+xml" href="./assets/images/bls-logo-short.svg">
    <title>Brittney Lauren Stationery — Coming Soon</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/signup.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.14.1/cdn.min.js"></script>
</head>

<body>
    <a class="skip-link" href="#signup-heading">Skip to sign-up form</a>

    <main>
        <article id="envelope" aria-labelledby="signup-heading">

            <a href="/" class="logo-link" aria-label="Brittney Lauren Stationery, home">
                <img
                    id="brittneyLauren"
                    src="./assets/images/bls-logo.svg"
                    alt="Brittney Lauren Stationery"
                    width="479"
                    height="137"
                    loading="eager"
                >
            </a>

            <div id="stamp" aria-hidden="true">
                <img src="./assets/images/bls-stamp.svg" alt="" class="stamp-border">
            </div>

            <div id="signup">
                <h1 id="signup-heading">Stationery is an art</h1>

                <form
                    id="signup-form"
                    x-data="signupForm()"
                    @submit.prevent="submitForm"
                    novalidate
                >
                    <div class="field" :class="{ 'field--error': errors.name }">
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder=" "
                            x-model="fields.name"
                            autocomplete="name"
                            required
                            :aria-invalid="errors.name ? 'true' : 'false'"
                            aria-errormessage="name-error"
                            @blur="validateField('name')"
                        >
                        <label for="name">Name:</label>
                        <p class="field-error" id="name-error" x-show="errors.name" x-text="errors.name" role="alert">Please enter your name.</p>
                    </div>

                    <div class="field" :class="{ 'field--error': errors.email }">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder=" "
                            x-model="fields.email"
                            autocomplete="email"
                            required
                            :aria-invalid="errors.email ? 'true' : 'false'"
                            aria-errormessage="email-error"
                            @blur="validateField('email')"
                        >
                        <label for="email">Email:</label>
                        <p class="field-error" id="email-error" x-show="errors.email" x-text="errors.email" role="alert">Please enter a valid email address.</p>
                    </div>

                    <button type="submit" :disabled="status === 'submitting'">
                        <span x-show="status !== 'submitting'">Submit</span>
                        <span x-show="status === 'submitting'">Submitting…</span>
                    </button>

                    <p
                        class="form-status"
                        x-show="status === 'success'"
                        role="status"
                    >
                        You're on the list! Watch your inbox for updates.
                    </p>
                    <p
                        class="form-status form-status--error"
                        x-show="status === 'error'"
                        role="alert"
                    >
                        <span x-text="serverError"></span>
                    </p>
                </form>

                <p id="comingsoon">
                    Get notified of the<br>
                    Brittney Lauren Stationery launch!
                </p>
            </div>

            <img
                id="leaf"
                src="./assets/images/leaf-design.svg"
                aria-hidden="true"
                width="277"
                height="274"
            >

        </article>
    </main>

    <footer>
        <p>Copyright Brittney Lauren 2026</p>
    </footer>

    <script src="./javascript/signup-form.js"></script>
</body>

</html>
